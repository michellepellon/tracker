# ABOUTME: GitHub Actions CI workflow for tracker.
# ABOUTME: Enforces all quality gates: format, vet, build, test, race, coverage, dippin lint, doctor.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dippin CLI
        run: go install github.com/2389-research/dippin-lang/cmd/dippin@v0.22.0

      - name: Format check
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Tests
        run: make test-short

      - name: Race detector
        run: make test-race

      - name: Coverage
        run: make coverage

      - name: Dippin lint
        run: make lint

      - name: Dippin doctor
        run: make doctor

      - name: Embedded workflows in sync
        run: make check-workflows

      - name: Verify tracker binary
        run: ./bin/tracker --help

      - name: Verify tracker-conformance binary
        run: ./bin/tracker-conformance list-handlers | grep -F stack.manager_loop

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tracker-binaries-linux-amd64
          path: |
            bin/tracker
            bin/tracker-conformance
          retention-days: 7
